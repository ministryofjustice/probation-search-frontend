name: Integration test
on: push

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout repo
    steps:
      - name: Checkout component
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: component

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache-dependency-path: component/package-lock.json
          cache: npm
          node-version: 24

      - name: Package component
        working-directory: component
        run: |
          npm clean-install
          npm run build
          npm pack ./dist

      - name: Checkout client
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ministryofjustice/probation-search-ui
          path: client

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache-dependency-path: client/package-lock.json
          cache: npm
          node-version: 24

      - name: Install new component version
        working-directory: client
        run: |
          npm clean-install
          npm install ../component/ministryofjustice-probation-search-frontend-0.0.0.tgz --save

      - name: Install cypress binary
        working-directory: client
        run: npx cypress install

      - name: Build
        working-directory: client
        run: npm run build

      - name: Unit test
        working-directory: client
        run: npm run test

      - name: Integration test
        working-directory: client
        run: |
          npm run wiremock &
          npm run start-feature & 
          sleep 5
          npm run int-test
