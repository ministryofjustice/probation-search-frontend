  schedule:
    - cron: "30 6 * * MON-FRI"
jobs:
  security-veracode-pipeline-scan:
    name: Security Veracode pipeline scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_pipeline_scan.yml@v2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
